     <h4>Find the second largest number in an array</h4>
 <p id="demo"></p>
    </head>
<body>
    <script>
let array = [10,45,30,20];

let l = array[0];
let sl = array[0];
for(let i=1; i<array.length ; i++){

    if (array[i]>l){
    sl = l;
l= array [i];

} else if(array[i]> sl && array [i]!== l){
sl = array[i];
}}


console.log(sl);
 document.getElementById("demo").innerHTML = `Array: ${array}<br> Second Largest: ${sl}`;
    </script>
