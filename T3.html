<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>task 3</title>
     <h4>Check if a string is palindrome.</h4>
    <p id="demo"></p>
</head>
<body>
    <script>

let str = "racecar";
let palindrome = true;

for (let i = 0; i < str.length; i++) {
    if (str[i] !== str[str.length - 1 - i]) {
        palindrome = false;
    }
}
document.getElementById("demo").innerHTML ="String: " + str + "<br>" + (palindrome ? "Palindrome" : "Not Palindrome");
    </script>
</body>
</html>
