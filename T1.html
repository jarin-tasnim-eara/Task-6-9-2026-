<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>task 1</title>
     <h4>Write a function to reverse a string.</h4>
    <p id="demo"></p>
<body>

    <script>
let str = "hello";
let result = "";

for (let i = str.length - 1; i >= 0; i--) {
  result = result + str.charAt(i);
}

document.getElementById("demo").innerHTML = "String : " + str + "<br>" + "Reversed string : " +result;
    </script>
</body>
</html>
